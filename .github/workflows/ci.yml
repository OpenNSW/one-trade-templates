name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Go fmt
        run: test -z "$(gofmt -l .)"
      - name: JSON lint
        run: go run ./cmd/jsonlint
      - name: Go vet
        run: go vet ./...
      - name: Go test
        run: go test ./...
